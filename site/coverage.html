<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverage - Tree-sitter Index</title>
    <meta
      name="description"
      content="Coverage view for exploring Tree-sitter query-kind support by editor and language."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="backdrop-blob backdrop-blob-a"></div>
      <div class="backdrop-blob backdrop-blob-b"></div>
      <div class="backdrop-blob backdrop-blob-c"></div>
    </div>

    <div class="page-layout">
      <aside class="site-sidebar card">
        <div class="sidebar-head">
          <h2>Tree-sitter Index</h2>
        </div>
        <nav class="sidebar-nav" aria-label="Section navigation">
          <a class="sidebar-link" href="index.html#explorer" data-preserve-search>
            <span class="sidebar-link-label">Explorer</span>
          </a>
          <a class="sidebar-link is-active" href="#coverage" data-nav-target="coverage" aria-current="location">
            <span class="sidebar-link-label">Coverage</span>
          </a>
        </nav>
      </aside>

      <main class="page-shell">
        <header class="menu-bar">
          <div class="menu-title">Tree-sitter Parser Index</div>
          <a
            class="inline-link menu-link"
            href="https://github.com/lewis6991/treesitter-parser-index"
            target="_blank"
            rel="noreferrer noopener"
          >
            <svg
              class="menu-link-icon"
              viewBox="0 0 16 16"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
                1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
                1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              ></path>
            </svg>
            GitHub
          </a>
        </header>

        <section class="section" id="coverage">
          <div class="section-heading">
            <h2>Coverage</h2>
            <p>
              Covered languages by editor and query kind.
            </p>
          </div>

          <div class="toolbar card">
            <label class="field field-search">
              <span>Search</span>
              <input
                id="search-input"
                type="search"
                placeholder="ruby, zed, textobjects, wasm"
              />
            </label>
            <label class="field">
              <span>Language</span>
              <select id="language-filter"></select>
            </label>
            <label class="field">
              <span>Editor</span>
              <select id="editor-filter"></select>
            </label>
            <label class="field">
              <span>Query Kind</span>
              <select id="query-kind-filter"></select>
            </label>
            <label class="field">
              <span>Install Route</span>
              <select id="install-filter">
                <option value="all">All routes</option>
                <option value="wasm">Wasm</option>
                <option value="source-archive">Source archive</option>
                <option value="build-from-source">Build from source</option>
              </select>
            </label>
            <label class="field">
              <span>Release</span>
              <select id="release-filter">
                <option value="all">All release states</option>
                <option value="semver">Semver release</option>
                <option value="none">No semver release</option>
              </select>
            </label>
          </div>

          <section class="card coverage-panel">
            <div class="column-heading">
              <div>
                <p class="eyebrow eyebrow-inline">Matrix</p>
                <h3>Coverage Matrix</h3>
              </div>
              <span class="badge">languages</span>
            </div>
            <div class="matrix" id="coverage-matrix"></div>
            <div class="coverage-detail" id="coverage-detail"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="dist/app.js"></script>
  </body>
</html>
